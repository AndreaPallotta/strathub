name: Release StratHub Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            app_binary: strathub_app.exe
            cli_binary: strathub-cli-windows-amd64.exe
            cli_source: src-tauri/target/release/strathub-cli.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            app_binary: strathub_app-linux-amd64
            cli_binary: strathub-cli-linux-amd64
            cli_source: src-tauri/target/release/strathub-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install UI dependencies & build frontend
        run: |
          cd ui
          npm ci
          npm run build

      - name: Build Tauri Desktop App & CLI Executable
        run: |
          cargo build --manifest-path src-tauri/Cargo.toml --release --bin strathub-cli
          cargo build --manifest-path src-tauri/Cargo.toml --release --bin strathub_app

      - name: Prepare Release Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Copy-Item ${{ matrix.cli_source }} -Destination ./${{ matrix.cli_binary }}
          Copy-Item src-tauri/target/release/strathub_app.exe -Destination ./${{ matrix.app_binary }}

      - name: Prepare Release Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          cp ${{ matrix.cli_source }} ./${{ matrix.cli_binary }}
          chmod +x ./${{ matrix.cli_binary }}
          if [ -f "src-tauri/target/release/strathub_app" ]; then
            cp src-tauri/target/release/strathub_app ./${{ matrix.app_binary }}
            chmod +x ./${{ matrix.app_binary }}
          fi

      - name: Publish Binaries to GitHub Tag Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.cli_binary }}
            ${{ matrix.app_binary }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
